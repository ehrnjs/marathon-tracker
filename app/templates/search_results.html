<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>선수 선택</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="container">

    <h1>선수 선택</h1>
    <p class="sub">동명이인이거나 여러 명이 있어서 선택이 필요해</p>

    <section class="dashboard-grid">
      {% for c in candidates %}
      <article class="card runner-card">

        <h2>BIB {{ c.bib }}</h2>

        <a class="btn-link"
           href="/runner?keyword={{ c.bib }}&usedata={{ c.usedata }}">
          이 선수 보기
        </a>

      </article>
      {% endfor %}
    </section>

  </main>
</body>
</html>
